# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# Selective, deliberate complement to the org-level CodeRabbit configuration
# (the org config stays primary; this only ADDS a path instruction). See AGENTS.md.
#
# Vendored shadcn/ui primitives under src/components/ui/** are generated by the
# shadcn CLI and re-synced from upstream, so they are exempt from the docstring /
# JSDoc coverage guideline — the repository's own scripts/docstring-coverage.mjs
# already excludes this path. Functional, security, and accessibility review of
# these files is unaffected.
reviews:
  path_instructions:
    - path: "src/components/ui/**"
      instructions: >-
        These are vendored shadcn/ui primitives generated by the shadcn CLI and
        re-synced from upstream. Do NOT require docstrings or JSDoc on the exported
        declarations here; the repository's docstring-coverage tooling already
        excludes this path by design. Continue to flag functional correctness,
        security, accessibility, and React/hydration issues.
