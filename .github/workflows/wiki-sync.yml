name: Sync wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'

# Serialize runs so back-to-back merges don't race on the wiki push.
concurrency:
  group: wiki-sync-${{ github.ref }}
  cancel-in-progress: false

# Least privilege: read by default; only the sync job elevates to write.
permissions:
  contents: read

jobs:
  sync:
    name: Sync docs/wiki to the GitHub wiki
    runs-on: ubuntu-latest
    timeout-minutes: 10  # release the concurrency lock if a git op hangs
    permissions:
      contents: write  # push to <repo>.wiki.git
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Push docs/wiki to the GitHub wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p docs/wiki
          wiki_url="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          if ! err="$(git ls-remote "$wiki_url" 2>&1 >/dev/null)"; then
            err="${err//$GH_TOKEN/***}"  # redact token before surfacing
            if printf '%s' "$err" | grep -qi 'repository not found'; then
              echo "::error::Wiki is not initialized — create the first wiki page in the GitHub UI, then re-run." >&2
            else
              echo "::error::Cannot reach the wiki repo (auth/permission or transient error): $err" >&2
            fi
            exit 1
          fi
          git clone "$wiki_url" wiki
          rsync -av --delete --exclude '.git' docs/wiki/ wiki/
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
          else
            git commit -m "docs: sync from docs/wiki @ ${{ github.sha }}"
            git push
          fi
