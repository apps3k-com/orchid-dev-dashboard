# PR gate for pull requests targeting `main`. Offline checks only — NO production
# secrets. Data-driven / full builds and deploys happen on the platform, not here.
#
# Customize per repo:
#   - working-directory: set to the app dir for a monorepo (e.g. apps/website).
#   - package manager: this template uses Bun; for npm/pnpm swap the setup +
#     install/run steps (npm ci; npm run ...). Keep the four gates below.
#   - Gates (mandatory): typecheck/lint, unit tests, docstring-coverage >= 80%.
#   - Actions are pinned to commit SHAs (supply-chain; CodeRabbit blanket policy).
#     Keep the pins — the `# vN` trailing comment lets Dependabot bump them.
name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .          # set to the app subdir for monorepos
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck / lint
        run: bun run check            # e.g. astro check / tsc --noEmit / eslint
      - name: Unit tests
        run: bun test
      - name: Docstring coverage (>= 80%)
        run: bun run docstring:coverage
