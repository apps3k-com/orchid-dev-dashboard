# PR gate for pull requests targeting `main`. Offline checks only — NO production
# secrets. Full builds / deploys happen on the platform, not here.
#
# Gates (mandatory): typecheck+lint, unit tests, docstring-coverage >= 80%.
# Actions are pinned to commit SHAs (supply-chain); the `# vN` comment lets
# Dependabot bump them. Prisma client is generated before typecheck (tsc needs it).
name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm exec prisma generate
      - name: Typecheck + lint
        run: pnpm run check
      - name: Unit tests
        run: pnpm test
      - name: Docstring coverage (>= 80%)
        run: pnpm run docstring:coverage
